services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: gojoye-backend2
    env_file:
      - ./Backend/.env
    ports:
      - "3000:3000"
    restart: unless-stopped

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: gojoye-frontend2
    depends_on:
      - backend
    ports:
      - "5173:80"
    restart: unless-stopped
